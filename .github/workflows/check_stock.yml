name: Pokémon Stock Checker

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes
  workflow_dispatch:          # Allows manual run from GitHub UI

# Prevent overlapping runs — queue rather than cancel
concurrency:
  group: stock-checker
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Needed to commit state.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock checker
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          # Uncomment the line below to also post a summary of every check:
          # DISCORD_SEND_SUMMARY: "1"
        run: python scraper.py

      - name: Commit updated state
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update stock state [skip ci]"
          git push
